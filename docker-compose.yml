version: "3"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    depends_on:
      - db
    volumes:
      - ./:/usr/src/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15
    env_file:
      - ./.env
    volumes: 
      - postgres-db:/var/lib/postgresql/data
volumes:
  postgres-db:            

